<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Roleta Cassino</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #0b3d2e, #06251c);
  color: white;
  padding-bottom: 260px;
}

h1 {
  font-size: 70px;
}

/* BOLINHA CENTRAL */
#container {
  margin-top: 130px;
  display: flex;
  justify-content: center;
}

.bola {
  width: 530px;
  height: 530px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 250px;
  font-weight: bold;
  color: white;
}

/* CORES */
.vermelho {
  background: red;
}

.preto {
  background: black;
  border: 3px solid white;
}

/* BOTÃO GIGANTE */
.btn {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 550px;

  font-size: 90px;
  font-weight: bold;

  border: none;
  background: gold;
  cursor: pointer;
}

.btn:active {
  background: #d4af37;
}
</style>
</head>

<body>

<h1>🎡 Roleta 🎡</h1>

<div id="container">
  <div id="bola" class="bola">-</div>
</div>

<button class="btn" onclick="girar()">🎰Girar🎰</button>

<script>
let girando = false;

const vermelhos = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

function cor(num) {
  return vermelhos.includes(num) ? "vermelho" : "preto";
}

function girar() {
  if (girando) return;
  girando = true;

  let bola = document.getElementById("bola");
  let final = Math.floor(Math.random() * 36) + 1;

  let tempo = 0;

  let intervalo = setInterval(() => {
    let temp = Math.floor(Math.random() * 36) + 1;

    bola.innerText = temp;
    bola.className = "bola " + cor(temp);

    tempo++;

    if (tempo > 20) {
      clearInterval(intervalo);

      bola.innerText = final;
      bola.className = "bola " + cor(final);

      girando = false;
    }

  }, 60);
}



/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}



</script>

</body>
</html>
